flags:
  pandoc:
    embed_data_files: true
  QuickCheck:
    old-random: false
packages:
- '.'
- 'pandoc-cli'
- 'pandoc-lua-engine'
- 'pandoc-server'
extra-deps:
- lpeg-1.1.0
- tls-2.1.5
- crypton-connection-0.4.3
- crypton-x509-validation-1.6.13
- toml-parser-2.0.1.0
- doclayout-0.5
- doctemplates-0.11.0.1
- djot-0.1.2.2
- commonmark-0.2.6.1
- typst-symbols-0.1.7
- typst-0.6.1
- texmath-0.12.8.12
- skylighting-core-0.14.4
- skylighting-0.14.4
- skylighting-format-blaze-html-0.1.1.3
- commonmark-extensions-0.2.5.6
- commonmark-pandoc-0.2.2.3
- git: https://github.com/pandoc/pandoc-lua-marshal.git
  commit: d3cc44f22e800f48d990f1adc8caca04ad8a6ee4
- git: https://github.com/hslua/hslua-module-doclayout.git
  commit: 7a0d74faa6fd82e8e4df31896e89079854814990
- git: https://github.com/hslua/hslua.git
  commit: 4ed57248c7f54007c2b74d48080b094e09770ee1
  subdirs:
    - hslua
    - hslua-aeson
    - hslua-classes
    - hslua-core
    - hslua-list
    - hslua-marshalling
    - hslua-module-path
    - hslua-module-text
    - hslua-module-system
    - hslua-module-version
    - hslua-module-zip
    - hslua-objectorientation
    - hslua-packaging
    - lua
    - lua-arbitrary
    - tasty-lua
resolver: lts-22.33
nix:
  packages:
  - pkg-config
  - zlib
